name: youtrack_timer
description: Автозаполнение рабочего времени в YouTrack с AI-оценкой через Cursor Agent.
version: 1.0.0
publish_to: none

environment:
  sdk: '>=3.11.0 <3.13.0'
  flutter: '>=3.41.2'

dependencies:
  args: ^2.6.0
  dotenv: ^4.2.0
  fl_chart: ^0.70.2
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_markdown: ^0.7.7
  flutter_riverpod: ^2.6.1
  google_fonts: ^6.2.1
  http: ^1.2.2
  intl: ^0.20.1
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  lints: ^5.0.0
  test: ^1.24.0

flutter:
  uses-material-design: true
